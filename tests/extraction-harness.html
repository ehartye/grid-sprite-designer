<!DOCTYPE html>
<html>
<head>
  <title>Extraction Test Harness</title>
  <style>
    body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; }
    .sprite-grid { display: grid; gap: 4px; max-width: 1200px; }
    .sprite-cell { background: #333; border: 1px solid #555; text-align: center; padding: 4px; }
    .sprite-cell img { max-width: 100%; image-rendering: pixelated; background: repeating-conic-gradient(#444 0% 25%, #555 0% 50%) 50% / 10px 10px; }
    .sprite-cell .label { font-size: 10px; color: #aaa; margin-top: 4px; }
    .info { margin-bottom: 16px; }
    #top-pixels { background: #222; padding: 8px; }
    #top-pixels canvas { margin: 2px; border: 1px solid #666; }
  </style>
</head>
<body>
  <h2>Extraction Test Harness (real spriteExtractor.ts)</h2>
  <div class="info" id="info">Loading...</div>

  <div class="section">
    <h3>Top 30px of each sprite (header bleed check)</h3>
    <div id="top-pixels"></div>
  </div>

  <div class="section">
    <h3>Extracted Sprites</h3>
    <div class="sprite-grid" id="sprites"></div>
  </div>

  <script type="module">
    import { extractSprites } from '/src/lib/spriteExtractor.ts';

    const params = new URLSearchParams(window.location.search);
    const fixture = params.get('fixture') || 'filled-grid.jpg';

    // Parse manifest (preferred) or individual params (legacy)
    let manifest = null;
    if (params.get('manifest')) {
      try {
        manifest = JSON.parse(params.get('manifest'));
      } catch (e) {
        console.error('Failed to parse manifest:', e);
      }
    }

    const gridCols = manifest?.cols ?? (params.get('cols') ? Number(params.get('cols')) : null);
    const gridRows = manifest?.rows ?? (params.get('rows') ? Number(params.get('rows')) : null);
    const gridCellW = manifest?.templateCellW ?? (params.get('cellW') ? Number(params.get('cellW')) : null);
    const gridCellH = manifest?.templateCellH ?? (params.get('cellH') ? Number(params.get('cellH')) : null);
    const gridHeaderH = manifest?.headerH ?? (params.get('headerH') ? Number(params.get('headerH')) : null);
    const gridBorder = manifest?.border ?? (params.get('border') ? Number(params.get('border')) : null);
    const gridLabels = manifest?.cellLabels ?? (params.get('labels') ? params.get('labels').split(',') : null);

    async function run() {
      const info = document.getElementById('info');
      info.textContent = `Loading fixture: ${fixture}...`;

      const displayCols = gridCols || 6;
      const displayRows = gridRows || 6;
      document.getElementById('sprites').style.gridTemplateColumns = `repeat(${displayCols}, 1fr)`;

      // Fetch fixture image and convert to base64
      const resp = await fetch(`/test-fixtures/${fixture}`);
      if (!resp.ok) throw new Error(`Failed to load fixture: ${resp.status}`);
      const blob = await resp.blob();
      const mimeType = blob.type || 'image/jpeg';

      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const dataUrl = reader.result;
          resolve(dataUrl.split(',')[1]);
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });

      // Build extraction config
      const extractionConfig = {};
      if (gridCols && gridRows) {
        const totalCells = gridCols * gridRows;
        const labels = gridLabels || Array.from({ length: totalCells }, (_, i) => `Cell ${Math.floor(i / gridCols)},${i % gridCols}`);
        extractionConfig.gridOverride = { cols: gridCols, rows: gridRows, totalCells, cellLabels: labels };
      }
      if (gridCellW) extractionConfig.templateCellW = gridCellW;
      if (gridCellH) extractionConfig.templateCellH = gridCellH;
      if (gridHeaderH != null) extractionConfig.headerH = gridHeaderH;
      if (gridBorder != null) extractionConfig.border = gridBorder;

      // Call the REAL extractSprites from production code
      const sprites = await extractSprites(base64, mimeType, Object.keys(extractionConfig).length > 0 ? extractionConfig : undefined);

      // ══════════════════════════════════════════════════════════════════
      // Phase 1: Decode all sprites and compute per-row metrics
      // ══════════════════════════════════════════════════════════════════
      const spriteData = [];
      for (const sprite of sprites) {
        const img = await loadImg(`data:${sprite.mimeType};base64,${sprite.imageData}`);
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        const fullData = ctx.getImageData(0, 0, img.width, img.height);
        const rowMetrics = [];
        for (let row = 0; row < img.height; row++) {
          let achroDarkCount = 0, brightCount = 0, opaqueCount = 0, brightnessSum = 0;
          for (let x = 0; x < img.width; x++) {
            const pi = (row * img.width + x) * 4;
            if (fullData.data[pi + 3] === 0) continue;
            opaqueCount++;
            const pr = fullData.data[pi], pg = fullData.data[pi + 1], pb = fullData.data[pi + 2];
            const bri = 0.299 * pr + 0.587 * pg + 0.114 * pb;
            brightnessSum += bri;
            const maxC = Math.max(pr, pg, pb);
            const minC = Math.min(pr, pg, pb);
            if ((maxC - minC) < 20 && bri < 25) achroDarkCount++;
            if (bri > 200 && (maxC - minC) < 30) brightCount++;
          }
          const headerLikePct = opaqueCount > 0
            ? ((achroDarkCount + brightCount) / opaqueCount) * 100
            : 0;
          rowMetrics.push({
            headerLikePct,
            brightPct: opaqueCount > 0 ? (brightCount / opaqueCount) * 100 : 0,
            avgBrightness: opaqueCount > 0 ? brightnessSum / opaqueCount : -1,
          });
        }

        const checkH = Math.min(30, img.height);
        const topData = ctx.getImageData(0, 0, img.width, checkH);
        spriteData.push({ sprite, img, ctx, rowMetrics, topData, checkH });
      }

      // ══════════════════════════════════════════════════════════════════
      // Phase 2: Cross-cell uniform analysis per grid row
      //
      // A dark band in ONE cell is content. A dark band at the SAME Y
      // position across ALL cells in a grid row is a template artifact
      // (header bar or row separator).
      // ══════════════════════════════════════════════════════════════════
      const HEADER_LIKE_THRESH = 80;
      const MIN_CONSECUTIVE = 10;
      const MIN_TEXT_ROWS = 3;
      const BAND_SKIP = 3;
      const MIN_BAND_RUN = 3;

      for (let gr = 0; gr < displayRows; gr++) {
        const cellsInRow = spriteData.filter((_, i) => Math.floor(i / displayCols) === gr);
        if (cellsInRow.length === 0) continue;
        const cellHeight = cellsInRow[0].img.height;
        const checkH = cellsInRow[0].checkH;

        // ── Uniform header bleed ──
        // Find min consecutive header-like rows from row 0 across ALL cells
        let minConsecutive = Infinity;
        let minTextRows = Infinity;
        for (const cell of cellsInRow) {
          let consecutive = 0, textRows = 0, done = false;
          for (let row = 0; row < checkH && !done; row++) {
            if (cell.rowMetrics[row].headerLikePct > HEADER_LIKE_THRESH) {
              consecutive++;
              if (cell.rowMetrics[row].brightPct > 2) textRows++;
            } else {
              done = true;
            }
          }
          minConsecutive = Math.min(minConsecutive, consecutive);
          minTextRows = Math.min(minTextRows, textRows);
        }

        const uniformBleed = (minConsecutive >= MIN_CONSECUTIVE && minTextRows >= MIN_TEXT_ROWS)
          ? parseFloat(((minConsecutive / checkH) * 100).toFixed(1))
          : 0;

        for (const cell of cellsInRow) {
          cell.headerBleedPct = uniformBleed;
        }

        // ── Uniform dark band scan ──
        // Find rows where ALL cells have header-like content (≥3 consecutive).
        // The uniformity across all cells IS the signal — template artifacts
        // repeat at the same Y position; content dark patches don't.
        let runStart = -1, runLen = 0;
        let worstBandPct = 0, worstBandRow = -1;

        for (let row = BAND_SKIP; row <= cellHeight - BAND_SKIP; row++) {
          const allHeaderLike = row < cellHeight - BAND_SKIP &&
            cellsInRow.every(c => row < c.rowMetrics.length && c.rowMetrics[row].headerLikePct > HEADER_LIKE_THRESH);

          if (allHeaderLike) {
            if (runStart < 0) runStart = row;
            runLen++;
          }

          if (!allHeaderLike || row === cellHeight - BAND_SKIP) {
            if (runLen >= MIN_BAND_RUN) {
              // Check that at least one row in the band has bright text
              let hasText = false;
              for (let br = runStart; br < runStart + runLen && !hasText; br++) {
                for (const cell of cellsInRow) {
                  if (cell.rowMetrics[br]?.brightPct > 2) { hasText = true; break; }
                }
              }

              if (hasText) {
                // Peak headerLikePct across all cells in this run
                let peakPct = 0, peakRow = -1;
                for (let br = runStart; br < runStart + runLen; br++) {
                  for (const cell of cellsInRow) {
                    if (cell.rowMetrics[br]?.headerLikePct > peakPct) {
                      peakPct = cell.rowMetrics[br].headerLikePct;
                      peakRow = br;
                    }
                  }
                }
                if (peakPct > worstBandPct) {
                  worstBandPct = peakPct;
                  worstBandRow = peakRow;
                }
              }
            }
            runStart = -1;
            runLen = 0;
          }
        }

        worstBandPct = parseFloat(worstBandPct.toFixed(1));
        for (const cell of cellsInRow) {
          cell.worstDarkBandPct = worstBandPct;
          cell.worstDarkBandRow = worstBandRow;
        }
      }

      // ══════════════════════════════════════════════════════════════════
      // Phase 3: Build results and render
      // ══════════════════════════════════════════════════════════════════
      const spritesDiv = document.getElementById('sprites');
      const topPixelsDiv = document.getElementById('top-pixels');
      const results = [];

      for (const sd of spriteData) {
        const { sprite, img, topData, checkH } = sd;
        const headerBleedPct = sd.headerBleedPct ?? 0;
        const worstDarkBandPct = sd.worstDarkBandPct ?? 0;
        const worstDarkBandRow = sd.worstDarkBandRow ?? -1;

        results.push({
          idx: sprite.cellIndex,
          label: sprite.label,
          headerBleedPct,
          cellW: sprite.width,
          cellH: sprite.height,
          worstDarkBandPct,
          worstDarkBandRow,
        });

        // Visual grid cell
        const cellEl = document.createElement('div');
        cellEl.className = 'sprite-cell';
        const spriteImg = document.createElement('img');
        spriteImg.src = `data:${sprite.mimeType};base64,${sprite.imageData}`;
        spriteImg.alt = sprite.label;
        cellEl.appendChild(spriteImg);
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = `${sprite.label} (${sprite.width}x${sprite.height})`;
        label.style.color = headerBleedPct > 30 ? '#f44' : '#8f8';
        cellEl.appendChild(label);
        spritesDiv.appendChild(cellEl);

        // Header bleed strip
        const stripCanvas = document.createElement('canvas');
        stripCanvas.width = img.width;
        stripCanvas.height = checkH;
        stripCanvas.title = `${sprite.label}: ${headerBleedPct}%`;
        const stripCtx = stripCanvas.getContext('2d');
        stripCtx.putImageData(topData, 0, 0);
        topPixelsDiv.appendChild(stripCanvas);
      }

      // Summary
      const maxBleed = Math.max(...results.map(r => r.headerBleedPct));
      const avgBleed = (results.reduce((s, r) => s + r.headerBleedPct, 0) / results.length).toFixed(1);
      const failing = results.filter(r => r.headerBleedPct > 30);

      info.innerHTML = `
        <b>Sprites:</b> ${sprites.length} |
        <b>Max bleed:</b> ${maxBleed}% |
        <b>Avg bleed:</b> ${avgBleed}% |
        <b>Failing (>30%):</b> ${failing.length}/${sprites.length}
        ${failing.length === 0 ? ' <span style="color:#8f8">ALL PASS</span>' : ''}
      `;

      // Expose results for Playwright
      window.__extractionDone = true;
      window.__results = results;
    }

    function loadImg(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    run().catch(err => {
      document.getElementById('info').textContent = 'ERROR: ' + err.message;
      console.error(err);
      window.__extractionDone = true;
      window.__results = [];
    });
  </script>
</body>
</html>
